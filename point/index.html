<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForestPoint</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #eef5ef;
            color: #0a4d47;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { font-size: 2em; margin-bottom: 8px; }
        p { color: #555; margin-bottom: 32px; }
        .btn {
            background: #1B5E20;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
        }
        .lang-bar {
            position: fixed;
            top: 16px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            border: 1px solid #b2d4b5;
            background: transparent;
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: #1B5E20;
            color: white;
            border-color: #1B5E20;
        }
    </style>
</head>
<body>

<div class="lang-bar">
    <button class="lang-btn" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<h1>🍄 ForestPoint</h1>
<p id="desc"></p>
<a class="btn" id="play-btn" href="https://play.google.com/store/apps/details?id=com.liulkovich.florapoint">
</a>

<script>
    const i18n = {
        ru: {
            desc: 'Установите приложение, чтобы открыть эту точку на карте',
            btn: 'Скачать в Google Play'
        },
        en: {
            desc: 'Install the app to open this point on the map',
            btn: 'Get it on Google Play'
        }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.classList.toggle('active', b.textContent.trim().toLowerCase() === lang);
        });
        document.getElementById('desc').textContent = i18n[lang].desc;
        document.getElementById('play-btn').textContent = i18n[lang].btn;
        document.documentElement.lang = lang;
    }

    const userLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
    setLang(userLang);

    // Deep link
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat');
    const lon = params.get('lon');
    const name = params.get('name');
    const category = params.get('category');
    if (lat && lon) {
        const deepLink = `florapoint://point?lat=${lat}&lon=${lon}&name=${encodeURIComponent(name || '')}&category=${category || 'custom'}`;
        window.location.href = deepLink;
        setTimeout(() => {}, 2000);
    }
</script>
</body>
</html>
